---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-config
  namespace: observability
data:
  prometheus.yml: |
    scrape_configs:
      - job_name: 'pve-exporter'
        static_configs:
          - targets:
              - 192.168.0.10 
        metrics_path: /pve
        params:
          module: [default]
          cluster: ['1']
          node: ['1']
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: pve-exp.observability.svc.cluster.local:9221

      - job_name: 'pve-node-exporter'
        static_configs:
          - targets:
              - "192.168.0.10:9100"
            labels:
              hostname: "pve1.kamil.net"
